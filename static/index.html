<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Asbestos Detection</title>
    <!-- Modern Font: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- Background blurred animated blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <main class="glass-panel">
        <header>
            <div class="header-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>Asbestos Detection</h1>
            <p>Upload a microscopic or material sample image to detect asbestos fibers using deep learning.</p>
        </header>

        <section id="upload-section">
            <div class="drop-zone" id="drop-zone">
                <input type="file" id="file-input" accept="image/*" hidden>
                <div class="drop-zone-content">
                    <svg class="upload-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 15V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M17 8L12 3L7 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 3V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <h3>Drag & Drop</h3>
                    <p>or <span class="browse-text">browse files</span> from your computer</p>
                </div>
            </div>
        </section>

        <!-- Loading State -->
        <section id="loading-section" class="hidden">
            <div class="spinner"></div>
            <p>Analyzing material fibers...</p>
        </section>

        <!-- Results display -->
        <section id="result-section" class="hidden">
            <div class="result-header">
                <h3>Analysis Complete</h3>
                <span id="detection-badge" class="badge badge-success">0 Detections</span>
            </div>
            
            <div class="image-wrapper">
                <img id="result-image" src="" alt="Detection Results">
            </div>

            <button class="btn-primary" id="btn-reset">
                Assess Another Image
            </button>
        </section>

    </main>

    <script src="/static/js/script.js"></script>
</body>
</html>
